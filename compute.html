<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Unity GPU Compute</title></head>
<body style="background:#0a0a0a;color:#22c55e;font-family:monospace;padding:20px;">
<h3>Unity GPU Compute Worker</h3>
<div id="status">Connecting to brain server...</div>
<div id="stats" style="margin-top:10px;font-size:12px;color:#555;"></div>
<div id="perf" style="margin-top:10px;font-size:11px;color:#444;"></div>
<script type="module">
import { GPUCompute } from './js/brain/gpu-compute.js';

const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const perfEl = document.getElementById('perf');

let gpu = null;
let gpuReady = false;
let ws = null;
let stepsComputed = 0;
let totalComputeMs = 0;

// Init WebGPU FIRST, then connect WebSocket
(async () => {
  statusEl.textContent = 'Initializing WebGPU...';
  gpu = new GPUCompute();
  gpuReady = await gpu.init();
  if (!gpuReady) {
    statusEl.textContent = 'WebGPU not available — GPU compute disabled';
    statusEl.style.color = '#ef4444';
    return;
  }
  statusEl.textContent = 'GPU ready — connecting to brain server...';
  statusEl.style.color = '#22c55e';

  // NOW connect WebSocket — GPU is ready
  connectToServer();
})();

const clusterState = {}; // persists across reconnects

function connectToServer() {
  ws = new WebSocket('ws://localhost:8080');

  ws.onopen = () => {
    statusEl.textContent = 'GPU + Server connected — registering as compute client...';
    ws.send(JSON.stringify({ type: 'gpu_register' }));
  };

  ws.onerror = (err) => {
    statusEl.textContent = 'WebSocket error — retrying in 3s...';
    statusEl.style.color = '#ef4444';
    console.warn('[GPU Compute] WebSocket error:', err);
  };

  // GPU maintains its OWN voltage state. Server sends voltages ONCE (init),
  // then only sends tonicDrive + noiseAmp per step (two numbers).
  // GPU runs LIF independently and sends back sparse spike indices.

  ws.onmessage = async (e) => {
  try {
    const msg = JSON.parse(e.data);

    // ── INIT: Server sends full voltages once per cluster ──
    if (msg.type === 'gpu_init' && gpuReady) {
      const { clusterName, size, lifParams } = msg;

      // Initialize at Vrest — NO voltage transfer needed
      // GPU creates buffers and fills with Vrest internally. Zero JS allocation.
      gpu.uploadCluster(clusterName, size, null, null, lifParams);
      clusterState[clusterName] = { initialized: true, size, lifParams };

      // Tell server this cluster is ready on GPU
      ws.send(JSON.stringify({ type: 'gpu_init_ack', clusterName, size }));

      const totalInit = Object.keys(clusterState).length;
      statusEl.textContent = `GPU initialized: ${totalInit}/7 clusters — ${clusterName} (${size.toLocaleString()} neurons)`;
      console.log(`[GPU] Initialized ${clusterName}: ${size.toLocaleString()} neurons (${totalInit}/7)`);
      return;
    }

    // ── STEP: Server sends only tonic + noise (two numbers) ──
    if (msg.type === 'compute_request' && gpuReady) {
      const { clusterName, size } = msg;
      const state = clusterState[clusterName];

      // If not initialized yet, request init
      if (!state?.initialized) {
        // Can't compute without init — tell server we missed
        ws.send(JSON.stringify({ type: 'compute_result', clusterName, spikeCount: 0, spikeIndices: [], size }));
        return;
      }

      // FULL GPU PIPELINE — zero JS loops for 3.2M neurons
      // 1. GPU generates currents (PCG hash noise — no Math.random loop)
      // 2. GPU runs LIF shader (voltage update + spike check)
      // 3. GPU counts spikes (atomic counter — no JS scan)
      // I = (tonic × driveBaseline × emotionalGate × gainMultiplier + errorCorrection) + noise
      const tonic = msg.tonicDrive || 16;
      const noiseAmp = msg.noiseAmp || 5;
      const gain = msg.gainMultiplier || 1.0;
      const emoGate = msg.emotionalGate || 1.0;
      const drive = msg.driveBaseline || 1.0;
      const errCorr = msg.errorCorrection || 0;
      const effectiveDrive = tonic * drive * emoGate * gain + errCorr;

      const t0 = performance.now();

      // ALL ON GPU — no JS loops, no CPU→GPU current upload, no GPU→CPU spike readback
      const result = await gpu.fullStep(clusterName, effectiveDrive, noiseAmp);

      // Send back spike count only — server doesn't need individual spike indices
      // for the simplified server brain (no intra-cluster synapses at 3.2M scale)
      ws.send(JSON.stringify({
        type: 'compute_result',
        clusterName,
        spikeCount: result.spikeCount,
        size: state.size,
      }));

      stepsComputed++;
      const elapsed = performance.now() - t0;
      totalComputeMs += elapsed;
      const avg = totalComputeMs / stepsComputed;
      statsEl.textContent = `Steps: ${stepsComputed.toLocaleString()} | Avg: ${avg.toFixed(1)}ms | Last: ${elapsed.toFixed(1)}ms | ${state.size.toLocaleString()} neurons`;
      perfEl.textContent = `Throughput: ${(state.size / (elapsed / 1000)).toFixed(0)} neurons/sec | Spikes: ${result.spikeCount.toLocaleString()} (${(result.spikeCount/state.size*100).toFixed(1)}%)`;
    }
  } catch (err) {
    console.warn('[GPU Compute] Error:', err.message, err.stack);
  }
};

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected — reconnecting in 3s...';
    statusEl.style.color = '#f59e0b';
    setTimeout(() => connectToServer(), 3000);
  };
} // end connectToServer
</script>
</body>
</html>
