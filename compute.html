<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Unity GPU Compute</title></head>
<body style="background:#0a0a0a;color:#22c55e;font-family:monospace;padding:20px;">
<h3>Unity GPU Compute Worker</h3>
<div id="status">Connecting to brain server...</div>
<div id="stats" style="margin-top:10px;font-size:12px;color:#555;"></div>
<div id="perf" style="margin-top:10px;font-size:11px;color:#444;"></div>
<script type="module">
import { GPUCompute } from './js/brain/gpu-compute.js';

const ws = new WebSocket('ws://localhost:8080');
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const perfEl = document.getElementById('perf');

let gpu = null;
let gpuReady = false;
let stepsComputed = 0;
let totalComputeMs = 0;

// Init WebGPU
(async () => {
  gpu = new GPUCompute();
  gpuReady = await gpu.init();
  if (gpuReady) {
    statusEl.textContent = 'GPU ready — waiting for brain server';
    statusEl.style.color = '#22c55e';
  } else {
    statusEl.textContent = 'WebGPU not available — GPU compute disabled';
    statusEl.style.color = '#ef4444';
  }
})();

ws.onopen = () => {
  statusEl.textContent = gpuReady ? 'GPU + Server connected — computing' : 'Server connected (no GPU)';
  ws.send(JSON.stringify({ type: 'gpu_register' }));
};

// GPU maintains its OWN voltage state. Server sends voltages ONCE (init),
// then only sends tonicDrive + noiseAmp per step (two numbers).
// GPU runs LIF independently and sends back sparse spike indices.
const clusterState = {}; // { name: { initialized, size, lifParams } }

ws.onmessage = async (e) => {
  try {
    const msg = JSON.parse(e.data);

    // ── INIT: Server sends full voltages once per cluster ──
    if (msg.type === 'gpu_init' && gpuReady) {
      const { clusterName, size, lifParams } = msg;

      // Decode initial voltages from base64
      let voltages;
      if (msg.voltagesBin) {
        const bin = atob(msg.voltagesBin);
        const buf = new ArrayBuffer(bin.length);
        const view = new Uint8Array(buf);
        for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
        voltages = new Float64Array(buf);
      } else {
        voltages = new Float64Array(size).fill(-65); // default Vrest
      }

      // Create GPU buffers for this cluster (once)
      gpu.uploadCluster(clusterName, size, voltages, null, lifParams);
      clusterState[clusterName] = { initialized: true, size, lifParams };

      statusEl.textContent = `GPU initialized: ${clusterName} (${size.toLocaleString()} neurons)`;
      console.log(`[GPU] Initialized ${clusterName}: ${size.toLocaleString()} neurons`);
      return;
    }

    // ── STEP: Server sends only tonic + noise (two numbers) ──
    if (msg.type === 'compute_request' && gpuReady) {
      const { clusterName, size } = msg;
      const state = clusterState[clusterName];

      // If not initialized yet, request init
      if (!state?.initialized) {
        // Can't compute without init — tell server we missed
        ws.send(JSON.stringify({ type: 'compute_result', clusterName, spikeCount: 0, spikeIndices: [], size }));
        return;
      }

      // Generate currents with FULL hierarchical modulation
      // I = (tonic × driveBaseline × emotionalGate × gainMultiplier + errorCorrection) + noise
      //
      // gainMultiplier = 0.9 + Ψ × 0.004    — consciousness scales everything
      // emotionalGate  = 0.7 + arousal × 0.6 — amygdala amplification
      // driveBaseline   = 0.8 + hypo_active   — hypothalamus homeostatic drive
      // errorCorrection = cerebellum feedback  — negative feedback to cortex/BG
      const tonic = msg.tonicDrive || 16;
      const noiseAmp = msg.noiseAmp || 5;
      const gain = msg.gainMultiplier || 1.0;
      const emoGate = msg.emotionalGate || 1.0;
      const drive = msg.driveBaseline || 1.0;
      const errCorr = msg.errorCorrection || 0;
      const n = state.size;
      const effectiveDrive = tonic * drive * emoGate * gain + errCorr;
      const currents = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        currents[i] = effectiveDrive + (Math.random() - 0.5) * noiseAmp;
      }

      const t0 = performance.now();

      // Run LIF on GPU — voltages stay on GPU, no transfer needed
      gpu.stepNeurons(clusterName, currents);

      // Read back ONLY spikes (not voltages — they stay on GPU for next step)
      const spikes = await gpu.readbackSpikes(clusterName);

      // Sparse spike indices — only send the ~2% that fired
      let spikeCount = 0;
      const spikeIndices = [];
      for (let i = 0; i < spikes.length; i++) {
        if (spikes[i]) { spikeCount++; spikeIndices.push(i); }
      }

      // Send back sparse results — tiny payload
      ws.send(JSON.stringify({
        type: 'compute_result',
        clusterName,
        spikeCount,
        spikeIndices,
        size: n,
      }));

      stepsComputed++;
      const elapsed = performance.now() - t0;
      totalComputeMs += elapsed;
      const avg = totalComputeMs / stepsComputed;
      statsEl.textContent = `Steps: ${stepsComputed.toLocaleString()} | Avg: ${avg.toFixed(1)}ms | Last: ${elapsed.toFixed(1)}ms | ${n.toLocaleString()} neurons`;
      perfEl.textContent = `Throughput: ${(n / (elapsed / 1000)).toFixed(0)} neurons/sec | Spikes: ${spikeCount.toLocaleString()} (${(spikeCount/n*100).toFixed(1)}%)`;
    }
  } catch (err) {
    console.warn('[GPU Compute] Error:', err.message, err.stack);
  }
};

ws.onclose = () => {
  statusEl.textContent = 'Disconnected — reconnecting...';
  statusEl.style.color = '#f59e0b';
  setTimeout(() => location.reload(), 3000);
};
</script>
</body>
</html>
